[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[functions.install_commands]]
  command = "npm install"

[functions."generate-image"]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
