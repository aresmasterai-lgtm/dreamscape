[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."generate-image"]
  timeout = 26

[[edge_functions]]
  path = "/blog/*"
  function = "og-meta"

[[edge_functions]]
  path = "/u/*"
  function = "og-meta"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
