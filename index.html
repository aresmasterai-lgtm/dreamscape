<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dreamscape — AI Artist Platform</title>
    <meta name="description" content="Generate AI art, connect with artists worldwide, and sell merchandise globally on Dreamscape." />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Preconnect — establish connections before JS runs ── -->
    <!-- Google Fonts DNS + TLS handshake done early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Supabase — first API call won't wait for DNS -->
    <link rel="preconnect" href="https://vjwrxyfbkppwnhotecza.supabase.co" />
    <link rel="dns-prefetch" href="https://vjwrxyfbkppwnhotecza.supabase.co" />
    <!-- Printful CDN — product images -->
    <link rel="dns-prefetch" href="https://files.cdn.printful.com" />
    <!-- Stripe — checkout -->
    <link rel="dns-prefetch" href="https://js.stripe.com" />
    <!-- Anthropic — Dream AI -->
    <link rel="dns-prefetch" href="https://api.anthropic.com" />

    <!-- ── Google Fonts — non-render-blocking ── -->
    <!-- Using link rel=stylesheet instead of @import inside CSS — loads in parallel -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap"
    />

    <!-- ── Critical CSS — prevents flash of unstyled content ── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        background: #030508;
        color: #E8EAF0;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 15px;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Prevent layout shift while React loads */
      #root { min-height: 100vh; }
      /* Immediate loading indicator */
      #root:empty::after {
        content: '';
        display: block;
        position: fixed;
        inset: 0;
        background: #030508;
      }
    </style>

    <!-- ── Open Graph / Social ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dreamscape" />
    <meta property="og:title" content="Dreamscape — AI Artist Platform" />
    <meta property="og:description" content="Generate AI art, connect with artists worldwide, and sell merchandise globally." />
    <meta property="og:image" content="https://trydreamscape.com/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dreamscape — AI Artist Platform" />
    <meta name="twitter:description" content="Generate AI art, connect with artists worldwide, and sell merchandise globally." />

    <!-- ── PWA / Mobile ── -->
    <meta name="theme-color" content="#030508" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dreamscape" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
